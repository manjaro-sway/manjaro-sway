name: build
on:
  schedule:
    - cron:  '30 2 * * 0'
  workflow_dispatch:
  repository_dispatch:
    types:
    - iso_profile_update
    - image_profile_update
  push:
    branches:
      - main
    paths:
      - .github/workflows/build.yaml
      - ci/**

concurrency: 
  group: ${{ github.workflow }}
  cancel-in-progress: true

env:
  MIRROR: https://opencolo.mm.fcix.net/manjaro

jobs:
  prepare-release:
    runs-on: ubuntu-24.04
    steps:
      - id: time
        uses: boredland/get-time-action@dbc808befb89eb33fee64f5f4abce4d2a5fa7cfd # tag=2.0.0
        with:
          format: 'YYYYMMDDHHmm'
      - id: receive
        uses: boredland/kernel-info@95a8330bcb748769fbba1923cf885aaa55098a54 # main
    outputs:
      release_tag: ${{ steps.time.outputs.time }}
      longterm: ${{ steps.receive.outputs.longterm-pkg }}
      stable: ${{ steps.receive.outputs.stable-pkg }}
  build-image:
    runs-on: ubuntu-24.04
    needs: [prepare-release]
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        branch: [unstable]
        device: [rpi4]
    steps:
      - name: import sway key
        run: gpg --keyserver keys.openpgp.org --receive-keys ${{ vars.GPG_KEYID }}
      - id: build
        name: arm build
        uses: manjaro-contrib/action-buildarmimg@d18252a49e9dbdece2a41dd58b1d2c7c5d96c8bf # main
        with:
          device: rpi4
          edition: sway
          branch: ${{ matrix.branch }}
          release-tag: ${{ needs.prepare-release.outputs.release_tag }}
          arm-profiles-repo: https://github.com/manjaro-sway/arm-profiles.git
          overlay-repo: https://packages.manjaro-sway.download/${{ matrix.branch }}/aarch64/manjaro-sway.db
      - name: upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: image-${{ matrix.branch }}-${{ matrix.device }}
          path: ${{ steps.build.outputs.file-path }}
          retention-days: 1
          if-no-files-found: error
  build-iso:
    runs-on: ubuntu-24.04
    needs: [prepare-release]
    strategy:
      fail-fast: false
      matrix:
        branch: [unstable]
        include:
          - branch: unstable
            kernel: ${{ needs.prepare-release.outputs.stable }}
    steps:
      - name: import sway key
        run: gpg --keyserver keys.openpgp.org --receive-keys ${{ vars.GPG_KEYID }}
      - id: build
        name: x86_64 build
        uses: manjaro-contrib/action-buildiso@377cedc76ac456dca7549920eff95ddcaf45c4dc # main
        with:
          iso-profiles-repo: https://github.com/Manjaro-Sway/iso-profiles
          edition: sway
          branch: ${{ matrix.branch }}
          scope: full
          kernel: ${{ matrix.kernel }}
          release-tag: ${{ needs.prepare-release.outputs.release_tag }}
          additional-trusted-gpg: ${{ vars.GPG_KEYID }}
          build-mirror: ${{ env.MIRROR }}
      - name: upload iso artifact
        uses: actions/upload-artifact@v4
        with:
          name: iso-${{ matrix.branch }}
          path: ${{ steps.build.outputs.file-path }}
          retention-days: 1
          if-no-files-found: error
  test-iso-boot:
    runs-on: ubuntu-24.04
    needs: [build-iso]
    strategy:
      fail-fast: false
      matrix:
        branch: [unstable]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: install qemu + kvm stack
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 ovmf
          # Self-hosted runners sometimes ship without /dev/kvm permissions
          sudo chmod 666 /dev/kvm || true
      - name: download iso
        uses: actions/download-artifact@v4
        with:
          name: iso-${{ matrix.branch }}
          path: artifact
      - name: boot smoke test
        env:
          SERIAL_LOG_OUT: ${{ github.workspace }}/serial.log
        run: |
          chmod +x ci/boot-smoke.sh
          ISO=$(ls artifact/*.iso | head -n1)
          ./ci/boot-smoke.sh "$ISO" x86_64
      - name: upload serial log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: serial-iso-${{ matrix.branch }}
          path: serial.log
          if-no-files-found: warn
  test-image-boot:
    runs-on: ubuntu-24.04-arm
    needs: [build-image]
    strategy:
      fail-fast: false
      matrix:
        branch: [unstable]
        device: [rpi4]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: install qemu + kvm stack
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-arm qemu-utils mtools fdisk xz-utils zstd
          sudo chmod 666 /dev/kvm || true
      - name: download image
        uses: actions/download-artifact@v4
        with:
          name: image-${{ matrix.branch }}-${{ matrix.device }}
          path: artifact
      - name: extract kernel + initramfs
        run: |
          chmod +x ci/extract-rpi-kernel.sh
          IMG=$(ls artifact/*.img* | head -n1)
          ./ci/extract-rpi-kernel.sh "$IMG"
      - name: boot smoke test
        env:
          SERIAL_LOG_OUT: ${{ github.workspace }}/serial.log
        run: |
          chmod +x ci/boot-smoke.sh
          # extract-rpi-kernel.sh decompresses in place; pick the resulting raw img
          IMG=$(ls artifact/*.img | head -n1)
          ./ci/boot-smoke.sh "$IMG" aarch64
      - name: upload serial log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: serial-image-${{ matrix.branch }}-${{ matrix.device }}
          path: serial.log
          if-no-files-found: warn
  test-iso-install:
    # Level 1 of the install test plan: boot the live ISO and verify the
    # Calamares process actually exec's. Catches installer-package missing,
    # autostart broken, dependency rot. Does *not* drive the wizard UI —
    # that's Phase 2 / issue #982.
    runs-on: ubuntu-24.04
    needs: [build-iso]
    strategy:
      fail-fast: false
      matrix:
        branch: [unstable]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: install qemu + kvm stack
        run: |
          sudo apt-get update
          sudo apt-get install -y qemu-system-x86 ovmf
          sudo chmod 666 /dev/kvm || true
      - name: download iso
        uses: actions/download-artifact@v4
        with:
          name: iso-${{ matrix.branch }}
          path: artifact
      - name: installer launch test
        env:
          SERIAL_LOG_OUT: ${{ github.workspace }}/serial.log
          BOOT_MARKER_REGEX: 'exe="/usr/bin/calamares"'
        run: |
          chmod +x ci/boot-smoke.sh
          ISO=$(ls artifact/*.iso | head -n1)
          # Boot + greetd + sway autostart + calamares exec — give it 12 min.
          ./ci/boot-smoke.sh "$ISO" x86_64 720
      - name: upload serial log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: serial-install-${{ matrix.branch }}
          path: serial.log
          if-no-files-found: warn
  trigger-mirror:
    runs-on: ubuntu-24.04
    needs: [build-iso, build-image, test-iso-boot, test-iso-install, test-image-boot]
    steps:
      - uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4
        with:
          token: ${{ secrets.DISPATCH_TOKEN }}
          repository: manjaro-sway/manjaro-sway
          event-type: new_release
  rollback:
    runs-on: ubuntu-24.04
    needs: [build-iso, build-image, prepare-release]
    if: ${{ failure() || cancelled() }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: rollback
        run: |
          echo ${{ github.token }} | gh auth login --with-token
          ASSET_COUNT=$(gh release view ${{ needs.prepare-release.outputs.release_tag }} --json "assets" --jq '.assets | length')
          if [ "$ASSET_COUNT" -gt "2" ]; then exit 0;fi
          gh release delete ${{ needs.prepare-release.outputs.release_tag }} -y --repo ${{ github.repository }}
          git push --delete origin ${{ needs.prepare-release.outputs.release_tag }}
